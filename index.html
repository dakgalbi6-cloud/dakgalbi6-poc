<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스피또 1000 시뮬레이터</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <main>
            <div id="ticket" class="ticket">
                <div class="ticket-header">
                    <div class="top-row">
                        <span class="round">제 78회</span>
                        <span class="type">즉석복권</span>
                    </div>
                    <div class="logo-area">
                        <h1>스피또<span>1000</span></h1>
                        <p class="prize-info">1등 당첨금 5억원</p>
                    </div>
                </div>

                <div class="game-area">
                    <div class="lucky-section">
                        <div class="section-title">행운숫자</div>
                        <div id="lucky-numbers" class="lucky-circle">
                            <!-- Lucky number will be injected here -->
                        </div>
                    </div>

                    <div class="scratch-area">
                        <div class="section-title">나의 숫자</div>
                        <div id="scratch-container" class="scratch-container">
                            <div id="my-numbers" class="my-numbers-grid">
                                <!-- My numbers will be injected here -->
                            </div>
                            <canvas id="scratch-canvas"></canvas>
                        </div>
                    </div>
                </div>

                <div class="ticket-footer">
                    <div class="serial-area">
                        <div class="barcode"></div>
                        <span class="serial-num">15948-26154-18451-25141</span>
                    </div>
                    <div class="price-tag">
                        <span>금액</span>
                        <strong>1,000원</strong>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="reset-btn" class="btn-primary">새 복권 구매하기</button>
            </div>
        </main>

        <div id="win-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">축하합니다!</div>
                <div class="win-icon">🎉</div>
                <p id="win-message">당첨금: 1,000,000원</p>
                <button id="modal-close" class="btn-close">확인</button>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
